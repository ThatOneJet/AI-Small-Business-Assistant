appId: com.jetcore.app
productName: JetCore
directories:
  output: dist-electron
  buildResources: build
# The electron-vite build output (main/preload/renderer) + the manifest.
files:
  - out/**
  - package.json
# Bundle the PyInstaller JetCore Operations backend. `resolveBackendExe()` in
# src/main/jetcore.ts looks for it at resourcesPath/jetcore-backend/backend.exe.
extraResources:
  - from: ../Summit/dist-pyinstaller/backend
    to: jetcore-backend
  # The Supabase config (PUBLIC anon key only — safe to ship). loadRootEnv()
  # reads it from resources/.env in the packaged app so cloud login works.
  - from: ../.env
    to: .env
  # The native Borderless software-KVM agent. resolveDaemonExe() in
  # apps/borderless/borderless.ts looks for it at resourcesPath/borderless-agent/borderlessd.exe.
  # Build it first: `cargo build --release` in ../borderless-agent.
  - from: ../borderless-agent/target/release/borderlessd.exe
    to: borderless-agent/borderlessd.exe
win:
  target: nsis
  icon: build/icon.ico
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
publish:
  provider: github
  owner: ThatOneJet
  repo: JetCore
