<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect Your Bank - JetCore</title>
    <script src="https://cdn.plaid.com/link/v2/stable/link-initialize.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }
        .loading-content {
            text-align: center;
            color: white;
        }
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .loading-text {
            font-size: 18px;
            font-weight: 500;
        }
        .loading-overlay.hidden {
            display: none;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            text-align: center;
            max-width: 400px;
        }
        h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 28px;
        }
        p {
            color: #666;
            margin-bottom: 30px;
            line-height: 1.5;
        }
        #linkButton {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px 32px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            width: 100%;
            font-weight: 600;
        }
        #linkButton:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        #linkButton:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-content">
            <div class="spinner"></div>
            <div class="loading-text">Loading Plaid...</div>
        </div>
    </div>

    <div class="container">
        <h1>🏦 Connect Your Bank</h1>
        <p>Link your bank account to JetCore to view your transactions and manage your finances.</p>
        <button id="linkButton">Connect Bank Account</button>
    </div>

    <script>
        const userId = "{{ user_id }}";
        const urlParams = new URLSearchParams(window.location.search);
        const products = urlParams.get('products') ? urlParams.get('products').split(',') : ['transactions', 'investments'];

        // Fetch link token from backend
        fetch('/api/link_token', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ user_id: userId, products: products })
        })
        .then(res => {
            console.log('Response status:', res.status);
            return res.json().then(data => ({ status: res.status, data: data }));
        })
        .then(({ status, data }) => {
            console.log('Response data:', data);

            if (status !== 200 || data.error) {
                const errorMsg = data.error || 'Unknown error';
                console.error('Backend error:', errorMsg);
                alert('Error: ' + errorMsg);
                document.getElementById('linkButton').disabled = true;
                document.getElementById('loadingOverlay').classList.add('hidden');
                return;
            }

            const config = {
                token: data.link_token,
                onSuccess: (publicToken, metadata) => {
                    console.log('Plaid onSuccess, public token:', publicToken);
                    document.getElementById('loadingOverlay').style.display = 'flex';
                    document.getElementById('loadingOverlay').querySelector('.loading-text').textContent = 'Completing authorization...';
                    document.getElementById('linkButton').disabled = true;
                    const productsParam = products.join(',');
                    window.location.href = `/exchange?public_token=${publicToken}&user_id=${userId}&products=${productsParam}`;
                },
                onExit: (err, metadata) => {
                    console.log('Plaid onExit', err, metadata);
                },
                onEvent: (eventName, metadata) => {
                    console.log('Plaid event:', eventName, metadata);
                }
            };

            console.log('Creating Plaid handler with token:', data.link_token.substring(0, 20) + '...');
            const linkHandler = Plaid.create(config);

            // Hide loading overlay once Plaid is ready
            document.getElementById('loadingOverlay').classList.add('hidden');

            document.getElementById('linkButton').addEventListener('click', () => {
                console.log('Button clicked, opening Plaid');
                linkHandler.open();
            });
        })
        .catch(err => {
            console.error('Fetch error:', err);
            alert('Failed to initialize: ' + err.message);
            document.getElementById('loadingOverlay').classList.add('hidden');
        });
    </script>
</body>
</html>
